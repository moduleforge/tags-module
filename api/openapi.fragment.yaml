# ---------------------------------------------------------------------------
# tags-module API — OpenAPI 3.0.3 fragment
#
# This is a FRAGMENT, not a standalone service spec. It is meant to be
# composed into a consumer's root spec via $ref. For example:
#
#   paths:
#     /tags:
#       $ref: '../../tags-module/api/openapi.fragment.yaml#/paths/~1tags'
#
# The fragment intentionally omits `servers:` because the mounting path and
# host are determined by each consuming service.
# ---------------------------------------------------------------------------

openapi: "3.0.3"

info:
  title: tags-module API
  version: "0.1.0"
  description: |
    Reusable OpenAPI fragment that describes the /tags and /entities/{uuid}/tags
    routes owned by tags-module. Consuming services compose this fragment into
    their own root spec via $ref rather than duplicating the definitions.

# ---------------------------------------------------------------------------
# Placeholder server — required by OpenAPI 3.0 tooling; consuming services
# override this with their own servers block when merging the fragment.
# ---------------------------------------------------------------------------
servers:
  - url: "/"
    description: Placeholder — override in consuming spec.

# ---------------------------------------------------------------------------
# Default security — all paths require bearerAuth unless overridden.
# ---------------------------------------------------------------------------
security:
  - bearerAuth: []

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # --------------------------------------------------------------------------
  # /tags — tag collection
  # --------------------------------------------------------------------------
  /tags:
    post:
      tags: [Tags]
      operationId: createTag
      summary: Create a tag
      description: |
        Creates a new tag. The owner is set server-side to the authenticated
        caller's entity ID — any client-supplied owner field is ignored.
        The subject must reference an existing entity UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

    get:
      tags: [Tags]
      operationId: searchTags
      summary: Search tags
      description: |
        Returns tags matching the given filters. At least one of `owner` or
        `subject` is required (400 otherwise). Results are authz-filtered:
        admins see all; non-admins see only tags they own or are subject of.
      parameters:
        - name: owner
          in: query
          description: Filter by owner entity UUID.
          schema:
            type: string
            format: uuid
        - name: subject
          in: query
          description: Filter by subject entity UUID.
          schema:
            type: string
            format: uuid
        - name: purpose
          in: query
          description: Filter by purpose (exact match).
          schema:
            type: string
        - name: value
          in: query
          description: Filter by value (exact match).
          schema:
            type: string
      responses:
        "200":
          description: List of matching tags (may be empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # --------------------------------------------------------------------------
  # /tags/{uuid} — tag detail, update, delete
  # --------------------------------------------------------------------------
  /tags/{uuid}:
    get:
      tags: [Tags]
      operationId: getTag
      summary: Read a tag by UUID
      description: |
        Returns the tag identified by its entity UUID. Admin, owner, or subject
        may read a tag. All other callers receive 404 (existence is not leaked).
      parameters:
        - $ref: "#/components/parameters/EntityUUID"
      responses:
        "200":
          description: Tag detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Tags]
      operationId: updateTag
      summary: Update a tag's color
      description: |
        Updates the `color` field of a tag. Only `color` is accepted; any other
        key in the request body causes a 400. Admin or owner may update.
        Subject callers receive 403 (they know the tag exists from GET).
        Other callers receive 404.
      parameters:
        - $ref: "#/components/parameters/EntityUUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTagRequest"
      responses:
        "200":
          description: Updated tag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Tags]
      operationId: deleteTag
      summary: Delete a tag
      description: |
        Removes the tag and its entity record. Admin or owner may delete.
        Other callers receive 404 (or 403 for subjects). This is a hard delete.
      parameters:
        - $ref: "#/components/parameters/EntityUUID"
      responses:
        "204":
          description: Tag deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # --------------------------------------------------------------------------
  # /entities/{uuid}/tags — list tags by subject
  # --------------------------------------------------------------------------
  /entities/{uuid}/tags:
    get:
      tags: [Tags]
      operationId: listTagsBySubject
      summary: List tags targeting a subject entity
      description: |
        Returns all tags whose subject is the given entity UUID, filtered by
        authz: admins see all, the subject entity sees all tags about itself,
        third parties see only tags they own on that subject.
      parameters:
        - $ref: "#/components/parameters/EntityUUID"
        - name: purpose
          in: query
          description: Optional filter by purpose (exact match).
          schema:
            type: string
      responses:
        "200":
          description: Tag list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:

  # -------------------------------------------------------------------------
  # Security schemes
  # -------------------------------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT obtained via any supported auth method (password, email-code,
        Google OIDC, Microsoft OIDC). Pass as `Authorization: Bearer <token>`.

  # -------------------------------------------------------------------------
  # Reusable parameters
  # -------------------------------------------------------------------------
  parameters:
    EntityUUID:
      name: uuid
      in: path
      required: true
      description: External UUID of the entity.
      schema:
        type: string
        format: uuid

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------
  schemas:

    Tag:
      type: object
      description: A tag associating a purpose:value label from an owner entity onto a subject entity.
      required: [uuid, ownerUuid, subjectUuid, purpose, value, createdAt, updatedAt]
      properties:
        uuid:
          type: string
          format: uuid
          description: Stable external identifier of the tag (its entity UUID).
        ownerUuid:
          type: string
          format: uuid
          description: External UUID of the entity that created this tag.
        subjectUuid:
          type: string
          format: uuid
          description: External UUID of the entity this tag is applied to.
        purpose:
          type: string
          maxLength: 512
          description: Namespace or category for the tag (e.g. "status", "priority").
        value:
          type: string
          maxLength: 512
          description: The tag value within the given purpose (e.g. "active", "high").
        color:
          type: string
          nullable: true
          pattern: '^#[0-9A-Fa-f]{8}$'
          description: Optional RGBA color in the format "#RRGGBBAA".
          example: "#FF0000FF"
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the tag was created.
        updatedAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the tag was last updated.

    CreateTagRequest:
      type: object
      required: [subject, purpose, value]
      description: Request body for POST /tags.
      properties:
        subject:
          type: string
          format: uuid
          description: External UUID of the entity to tag.
        purpose:
          type: string
          maxLength: 512
          description: Namespace or category for the tag.
        value:
          type: string
          maxLength: 512
          description: The tag value within the given purpose.
        color:
          type: string
          nullable: true
          pattern: '^#[0-9A-Fa-f]{8}$'
          description: Optional RGBA color in the format "#RRGGBBAA".

    UpdateTagRequest:
      type: object
      required: [color]
      description: |
        Request body for PUT /tags/{uuid}. Only `color` is accepted; any other
        key in the JSON body causes a 400 Bad Request.
      properties:
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{8}$'
          description: New RGBA color value in the format "#RRGGBBAA".
          example: "#00FF00FF"

    TagListResponse:
      type: object
      description: Wrapper for list responses to allow forward-compatible extension.
      required: [tags]
      properties:
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"

    ErrorResponse:
      type: object
      required: [error, message]
      description: Standard error envelope returned for 4xx and 5xx responses.
      properties:
        error:
          type: string
          description: Machine-readable error code.
          example: not_found
        message:
          type: string
          description: Human-readable error description.
          example: "resource not found"

  # -------------------------------------------------------------------------
  # Reusable responses
  # -------------------------------------------------------------------------
  responses:

    BadRequest:
      description: The request body or parameters are invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Missing or invalid authentication token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Caller lacks the required privileges for this operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: The requested resource does not exist or is not visible to the caller.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: A resource with the given parameters already exists.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
